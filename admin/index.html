<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feurona Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }
    a { color: inherit; }

    /* Login */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); width: 340px; }
    .login-card h1 { font-size: 22px; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; margin-bottom: 14px; }
    .login-card button { width: 100%; padding: 11px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    .login-card button:hover { background: #444; }
    .error-msg { color: #c00; font-size: 13px; margin-top: 8px; }

    /* Admin layout */
    #admin-screen { display: none; }
    header { background: #222; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
    header a { color: #aaa; font-size: 13px; text-decoration: none; }
    header a:hover { color: #fff; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 16px; }

    /* New entry form */
    .card { background: #fff; border-radius: 10px; padding: 28px; margin-bottom: 32px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
    .card h2 { font-size: 17px; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
    input[type="text"], textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
    textarea { resize: vertical; min-height: 80px; }
    .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s; }
    .upload-area:hover, .upload-area.drag { border-color: #666; }
    .upload-area input[type="file"] { display: none; }
    .upload-area p { font-size: 13px; color: #777; margin-top: 6px; }
    .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .preview-grid img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
    .preview-grid .preview-item { position: relative; }
    .preview-item .remove-img { position: absolute; top: -6px; right: -6px; background: #c00; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #222; color: #fff; }
    .btn-primary:hover { background: #444; }
    .btn-primary:disabled { background: #aaa; cursor: default; }
    .form-actions { margin-top: 20px; display: flex; align-items: center; gap: 14px; }
    .status-msg { font-size: 13px; color: #080; }
    .status-msg.err { color: #c00; }

    /* Entries list */
    .entries-list { display: grid; gap: 14px; }
    .entry-card { background: #fff; border-radius: 8px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .entry-thumb { width: 72px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: #eee; }
    .entry-info { flex: 1; min-width: 0; }
    .entry-info h3 { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-info p { font-size: 12px; color: #888; margin-top: 3px; }
    .entry-info .slug { font-family: monospace; font-size: 12px; color: #aaa; }
    .btn-delete { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 6px 12px; font-size: 13px; color: #c00; cursor: pointer; }
    .btn-delete:hover { background: #fff0f0; border-color: #c00; }
    .empty-state { text-align: center; color: #aaa; font-size: 14px; padding: 40px; }

    .progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
    .progress-bar-fill { height: 100%; background: #222; transition: width .3s; width: 0%; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Feurona Admin</h1>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
    <button id="login-btn">Sign in</button>
    <div id="login-error" class="error-msg"></div>
  </div>
</div>

<!-- Admin -->
<div id="admin-screen">
  <header>
    <h1>Feurona Admin</h1>
    <a href="/" target="_blank">View site &rarr;</a>
  </header>
  <div class="container">

    <!-- Add new entry -->
    <div class="card">
      <h2>Add Portfolio Entry</h2>
      <div class="form-grid">
        <div>
          <label for="title">Title *</label>
          <input type="text" id="title" placeholder="e.g. Brand Identity for Acme" />
        </div>
        <div>
          <label for="slug">Slug * <span style="font-weight:400;color:#aaa">(URL path)</span></label>
          <input type="text" id="slug" placeholder="e.g. acme-brand-identity" />
        </div>
        <div class="full">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Short project description…"></textarea>
        </div>
        <div class="full">
          <label>Cover Image * <span style="font-weight:400;color:#aaa">(first image becomes the gallery thumbnail)</span></label>
          <div class="upload-area" id="cover-drop" onclick="document.getElementById('cover-file').click()">
            <input type="file" id="cover-file" accept="image/*" />
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p id="cover-label">Click or drag to upload cover image</p>
            <div class="progress-bar" id="cover-progress"><div class="progress-bar-fill" id="cover-progress-fill"></div></div>
          </div>
          <div id="cover-preview" class="preview-grid"></div>
        </div>
        <div class="full">
          <label>Additional Project Images</label>
          <div class="upload-area" id="images-drop" onclick="document.getElementById('images-file').click()">
            <input type="file" id="images-file" accept="image/*" multiple />
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Click or drag to upload project images</p>
            <div class="progress-bar" id="images-progress"><div class="progress-bar-fill" id="images-progress-fill"></div></div>
          </div>
          <div id="images-preview" class="preview-grid"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="save-btn">Save Entry</button>
        <span class="status-msg" id="save-status"></span>
      </div>
    </div>

    <!-- Entries list -->
    <div class="card">
      <h2>Existing Entries</h2>
      <div id="entries-list" class="entries-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

  </div>
</div>

<script>
  const loginScreen = document.getElementById('login-screen');
  const adminScreen = document.getElementById('admin-screen');

  let coverImageUrl = null;
  let additionalImageUrls = [];

  // Auto-slug from title
  document.getElementById('title').addEventListener('input', e => {
    const slug = document.getElementById('slug');
    if (!slug.dataset.edited) {
      slug.value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }
  });
  document.getElementById('slug').addEventListener('input', e => {
    e.target.dataset.edited = '1';
  });

  // Login
  async function tryLogin() {
    const password = document.getElementById('password-input').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        loginScreen.style.display = 'none';
        adminScreen.style.display = 'block';
        loadEntries();
      } else {
        errEl.textContent = 'Incorrect password.';
      }
    } catch {
      errEl.textContent = 'Connection error.';
    }
  }
  document.getElementById('login-btn').addEventListener('click', tryLogin);
  document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  // Check if already logged in
  (async () => {
    const res = await fetch('/api/entries');
    if (res.ok) {
      loginScreen.style.display = 'none';
      adminScreen.style.display = 'block';
      loadEntries();
    }
  })();

  // Upload helper
  async function uploadFile(file, progressBarId, progressFillId) {
    const bar = document.getElementById(progressBarId);
    const fill = document.getElementById(progressFillId);
    bar.style.display = 'block';
    fill.style.width = '10%';

    const form = new FormData();
    form.append('file', file);
    fill.style.width = '40%';

    const res = await fetch('/api/upload', { method: 'POST', body: form });
    fill.style.width = '100%';
    setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 600);

    if (!res.ok) throw new Error('Upload failed');
    const data = await res.json();
    return data.url;
  }

  function addPreview(container, url, onRemove) {
    const item = document.createElement('div');
    item.className = 'preview-item';
    const img = document.createElement('img');
    img.src = url;
    const btn = document.createElement('button');
    btn.className = 'remove-img';
    btn.textContent = '×';
    btn.onclick = () => { item.remove(); onRemove(); };
    item.appendChild(img);
    item.appendChild(btn);
    container.appendChild(item);
  }

  // Cover image
  document.getElementById('cover-file').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const url = await uploadFile(file, 'cover-progress', 'cover-progress-fill');
      coverImageUrl = url;
      document.getElementById('cover-preview').innerHTML = '';
      addPreview(document.getElementById('cover-preview'), url, () => { coverImageUrl = null; });
      document.getElementById('cover-label').textContent = file.name;
    } catch {
      alert('Cover image upload failed.');
    }
  });

  // Additional images
  document.getElementById('images-file').addEventListener('change', async e => {
    const files = Array.from(e.target.files);
    for (const file of files) {
      try {
        const url = await uploadFile(file, 'images-progress', 'images-progress-fill');
        additionalImageUrls.push(url);
        addPreview(document.getElementById('images-preview'), url, () => {
          additionalImageUrls = additionalImageUrls.filter(u => u !== url);
        });
      } catch {
        alert(`Failed to upload ${file.name}`);
      }
    }
  });

  // Drag & drop
  ['cover-drop', 'images-drop'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag');
      const inputId = id === 'cover-drop' ? 'cover-file' : 'images-file';
      const dt = new DataTransfer();
      Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
      document.getElementById(inputId).files = dt.files;
      document.getElementById(inputId).dispatchEvent(new Event('change'));
    });
  });

  // Save entry
  document.getElementById('save-btn').addEventListener('click', async () => {
    const title = document.getElementById('title').value.trim();
    const slug = document.getElementById('slug').value.trim();
    const description = document.getElementById('description').value.trim();
    const statusEl = document.getElementById('save-status');
    const btn = document.getElementById('save-btn');

    statusEl.textContent = '';
    statusEl.className = 'status-msg';

    if (!title || !slug) { statusEl.textContent = 'Title and slug are required.'; statusEl.className = 'status-msg err'; return; }
    if (!coverImageUrl) { statusEl.textContent = 'Please upload a cover image.'; statusEl.className = 'status-msg err'; return; }

    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/entries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, slug, description, coverImage: coverImageUrl, images: additionalImageUrls }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Save failed');
      statusEl.textContent = 'Entry saved!';
      document.getElementById('title').value = '';
      document.getElementById('slug').value = '';
      delete document.getElementById('slug').dataset.edited;
      document.getElementById('description').value = '';
      document.getElementById('cover-preview').innerHTML = '';
      document.getElementById('images-preview').innerHTML = '';
      document.getElementById('cover-label').textContent = 'Click or drag to upload cover image';
      coverImageUrl = null;
      additionalImageUrls = [];
      loadEntries();
    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = 'status-msg err';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Entry';
    }
  });

  // Load entries
  async function loadEntries() {
    const el = document.getElementById('entries-list');
    el.innerHTML = '<div class="empty-state">Loading…</div>';
    try {
      const res = await fetch('/api/entries');
      const entries = await res.json();
      if (!entries.length) { el.innerHTML = '<div class="empty-state">No entries yet. Add one above.</div>'; return; }
      el.innerHTML = '';
      entries.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.innerHTML = `
          <img class="entry-thumb" src="${entry.coverImage}" alt="${entry.title}" onerror="this.style.background='#eee'" />
          <div class="entry-info">
            <h3>${entry.title}</h3>
            <p>${entry.description || '<em style="color:#ccc">No description</em>'}</p>
            <div class="slug">/${entry.slug} &nbsp;·&nbsp; ${entry.images.length + 1} image(s) &nbsp;·&nbsp; ${new Date(entry.createdAt).toLocaleDateString()}</div>
          </div>
          <button class="btn-delete" data-id="${entry.id}">Delete</button>
        `;
        card.querySelector('.btn-delete').addEventListener('click', () => deleteEntry(entry.id, entry.title));
        el.appendChild(card);
      });
    } catch {
      el.innerHTML = '<div class="empty-state">Failed to load entries.</div>';
    }
  }

  async function deleteEntry(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    try {
      await fetch(`/api/entries?id=${id}`, { method: 'DELETE' });
      loadEntries();
    } catch {
      alert('Delete failed.');
    }
  }
</script>
</body>
</html>
